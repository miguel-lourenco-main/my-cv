# ===========================================================================
# TEMPORARY no-build deploy.
# ---------------------------------------------------------------------------
# The CI runner is currently on an IPv6-only network with no NAT64, so the
# npm registry (IPv4-only path via corepack/npm) is unreachable and the normal
# build jobs fail at `corepack prepare`. The three CVs were therefore built
# LOCALLY and uploaded to this project's generic Package Registry; the `pages`
# job below just fetches and publishes that artifact (curl + tar over IPv6,
# no npm). The git clone / package download work fine over IPv6.
#
# TO RESTORE the normal build-based pipeline once on a dual-stack/IPv4 network:
#   git revert <this commit>      (brings back build_job/build_warp/build_visor)
# ===========================================================================
include:
  - project: public-work4/infra
    ref: 6cafd7d888cb72ca981216fc6a6188dcb71d3722
    file:
      - ci/templates/fragments/toolchain-node-pnpm.gitlab-ci.yml
      - ci/templates/jobs-my-cv.gitlab-ci.yml
      - ci/templates/deploy-gitlab-pages.gitlab-ci.yml

variables:
  NODE_ENV: production
  PNPM_CACHE_FOLDER: .pnpm-store

# Disable the npm/corepack-dependent jobs from the included templates — they
# can't reach the IPv4-only npm registry on the current IPv6-only network.
i18n:translate:
  rules:
    - when: never

build_job:
  rules:
    - when: never

# Publish the locally-built site (root = systeme, /warp, /visor — both variants
# carry the 3D flag + the laptop-height-cap fix) from the generic Package
# Registry. No build, no npm: only curl + tar, which work over IPv6.
pages:
  image: node:18.18.0
  stage: deploy_production
  dependencies: []
  variables:
    GIT_STRATEGY: none
    SITE_PKG: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/cv-site/20260613-051245/site.tgz"
  script:
    - echo "Publishing locally-built site to ${CI_PAGES_URL}"
    - rm -rf public && mkdir -p public
    - 'curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" -o site.tgz "${SITE_PKG}"'
    - tar xzf site.tgz -C public
    - ls -la public/ public/warp/ public/visor/
  artifacts:
    paths:
      - public/
    expire_in: never
  environment:
    name: production
    url: $CI_PAGES_URL
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
